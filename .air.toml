# Hot-reload config for `air` (https://github.com/air-verse/air).
# Watches the source and rebuilds/restarts the dashboard on save. Because the
# templates and CSS are embedded into the binary (//go:embed), even a
# template-only edit needs a rebuild — which is exactly what this does.
# Start it with `make dev` (or bare `air`).
root = "."
tmp_dir = "tmp"

[build]
  # Same build invocation as `make build`, into a temp binary air owns.
  cmd = "CGO_ENABLED=0 go build -o ./tmp/jira-stats ./cmd/jira-stats"
  bin = "./tmp/jira-stats"
  # Rebuild on Go source and template edits. output.css is committed, so a
  # class change still needs `make css`; air then picks up the regenerated file.
  include_ext = ["go", "html", "css"]
  exclude_dir = ["tmp", "bin", "dist", "node_modules", ".git", ".context"]
  exclude_regex = ["_test\\.go$"]
  # Give the build a moment to settle before restarting.
  delay = 300
  stop_on_error = true

[misc]
  # Remove the temp binary when air exits.
  clean_on_exit = true
