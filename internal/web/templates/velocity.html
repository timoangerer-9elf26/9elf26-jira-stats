<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velocity &mdash; 9elf26 Jira Stats</title>
  <link rel="stylesheet" href="/static/output.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl px-6 py-12">
    <nav class="text-sm text-slate-500">
      <a href="/" class="hover:text-slate-900">Now</a>
      <span class="mx-2 text-slate-300">/</span>
      <a href="/completed" class="hover:text-slate-900">Completed</a>
      <span class="mx-2 text-slate-300">/</span>
      <span class="font-medium text-slate-900">Velocity</span>
    </nav>
    <h1 class="mt-2 text-2xl font-semibold tracking-tight">9elf26 Jira Stats</h1>
    <p class="mt-1 text-sm text-slate-500">Velocity &mdash; completed points per ISO week, to inform next week's plan.</p>

    <section data-testid="velocity" class="mt-8 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h2 class="text-sm font-medium uppercase tracking-wide text-slate-500">Completed points per week</h2>
      <div class="mt-6 flex items-end gap-2 sm:gap-3" role="list" aria-label="Completed points per ISO week">
        {{range .Weeks}}
          {{template "velocity-bar" .}}
        {{else}}
          <p class="text-sm text-slate-500">No velocity data yet.</p>
        {{end}}
      </div>
    </section>
  </main>
</body>
</html>
